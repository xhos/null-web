name: notify null

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NULL_DISPATCH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'xhos',
              repo: 'null',
              workflow_id: 'update-input.yml',
              ref: 'main',
              inputs: { input: 'null-web' },
            });
